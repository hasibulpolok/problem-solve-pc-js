<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime</title>
</head>
<body>
    
<script>
    let num = parseInt(prompt("Enter a number to check prim no :"))
    let isPrime = true;
    
    if(num<=1){
        isPrime=false;
    }else{
        for (let i =2; i = Math.sqrt(num); i++){
            if (num % i === 0){
                isPrime = false;
                break;
            }
        }
    }

 if (isPrime) {
    document.write("<h2>" + num + " is a Prime Number</h2>");
} else {
    document.write("<h2>" + num + " is NOT a Prime Number</h2>");
}
</script>


</body>
</html>
