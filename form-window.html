<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Form Data Show</title>
  <style>
    input {
      padding: 8px;
      width: 250px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>Data Form</h2>

  <form id="userForm">
    <input type="text" id="name" placeholder="Enter Name" required><br><br>
    <input type="email" id="email" placeholder="Enter Email" required><br><br>
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
  </form>

  <script>
    document.getElementById("userForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();

      const popup = window.open("", "", "width=400,height=400");

      if (!popup) {
        alert("Popup blocked! Please allow popups for this site.");
        return;
      }

      popup.document.title = "Submitted Data";

      const body = popup.document.body;
      body.style.fontFamily = "Arial, sans-serif";
      body.style.padding = "20px";

      const heading = popup.document.createElement("h3");
      heading.textContent = "Submitted Data";

      const namePara = popup.document.createElement("p");
      namePara.innerHTML = "<strong>Name:</strong> " + name;

      const emailPara = popup.document.createElement("p");
      emailPara.innerHTML = "<strong>Email:</strong> " + email;

       const footer = popup.document.createElement("p");
      footer.textContent = "@ all reserved by Hasibul Polok";

      body.appendChild(heading);
      body.appendChild(namePara);
      body.appendChild(emailPara);
      body.appendChild(footer)
    });
  </script>

</body>

</html>
