<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci Series</title>
</head>

<body>


    <script>
       let a = 0;
       let b = 1;
       let c ;
       document.write(a);
       document.write(b);

       for (let i =2 ; i<10; i++){
        c = a+b;
        document.write(c + " ")
        a=b;
        b=c
       }

    </script>


</body>

</html>
